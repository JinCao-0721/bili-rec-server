server {
    listen 80;
    server_name _;

    location /bili-status {
        proxy_pass http://127.0.0.1:2234/api/status;
    }

    location /bili-refresh-qrcode {
        proxy_pass http://127.0.0.1:2234/api/refresh-qrcode;
    }

    location /bili-notify-config {
        proxy_pass http://127.0.0.1:2234/api/notify-config;
    }

    location /bili-notify-test {
        proxy_pass http://127.0.0.1:2234/api/notify-test;
    }

    location /bili-rooms {
        proxy_pass http://127.0.0.1:2234/api/rooms;
    }

    location /bili-brec-cookie {
        proxy_pass http://127.0.0.1:2234/api/brec-cookie;
    }

    location /bili-baidu-login {
        proxy_pass http://127.0.0.1:2234/api/baidu-login;
    }

    location /bili-baidu-logout {
        proxy_pass http://127.0.0.1:2234/api/baidu-logout;
    }

    location /bili-qq-logout {
        proxy_pass http://127.0.0.1:2234/api/qq-logout;
    }

    location /bili-room-add {
        proxy_pass http://127.0.0.1:2234/api/room-add;
    }

    location /bili-room-remove {
        proxy_pass http://127.0.0.1:2234/api/room-remove;
    }

    location /bili-room-start {
        proxy_pass http://127.0.0.1:2234/api/room-start;
    }

    location /bili-room-stop {
        proxy_pass http://127.0.0.1:2234/api/room-stop;
    }

    location /qrcode.png {
        alias /opt/napcat-shell/napcat/cache/qrcode.png;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma no-cache;
        add_header Expires 0;
    }

    location / {
        root /var/www/status;
        index index.html;
    }
}
